{% extends 'base.html' %}
{% block title %}New Topic - WebDesign Academy{% endblock %}
{% block content %}
<div style="max-width:600px;margin:3rem auto;padding:2rem;">
    <h1 style="font-size:2rem;font-weight:800;color:white;margin-bottom:2rem;">💬 New Discussion</h1>
    <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
        {% csrf_token %}
        <select name="category" required style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
        <input type="text" name="title" placeholder="Topic title" required style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
        <textarea name="content" placeholder="What's on your mind?" rows="5" required style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;resize:vertical;"></textarea>
        <button type="submit" class="btn btn-primary" style="justify-content:center;">Post Topic</button>
    </form>
</div>
{% endblock %}
