{% extends 'base.html' %}
{% block title %}Create Poll - WebDesign Academy{% endblock %}
{% block content %}
<div style="max-width:600px;margin:3rem auto;padding:2rem;">
    <h1 style="font-size:2rem;font-weight:800;color:white;">📊 Create Poll</h1>
    <form method="POST" class="card" style="padding:2rem;margin-top:1rem;">
        {% csrf_token %}
        <label style="color:#9ca3af;">Question</label>
        <input type="text" name="question" placeholder="What course should we add next?" required 
               style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;">
        <label style="color:#9ca3af;">Options (at least 2)</label>
        <input type="text" name="options" placeholder="Option 1" required style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 0.5rem;">
        <input type="text" name="options" placeholder="Option 2" required style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 0.5rem;">
        <input type="text" name="options" placeholder="Option 3 (optional)" style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;">
        <input type="text" name="options" placeholder="Option 4 (optional)" style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;">
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Poll 🚀</button>
    </form>
</div>
{% endblock %}
