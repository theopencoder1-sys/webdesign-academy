{% extends 'base.html' %}
{% block title %}AI Assistant - WebDesign Academy{% endblock %}
{% block content %}

<div style="max-width:700px;margin:2rem auto;padding:0 1rem;height:calc(100vh - 180px);display:flex;flex-direction:column;">
    
    <!-- Header -->
    <div style="text-align:center;margin-bottom:1rem;">
        <h1 style="font-size:1.8rem;font-weight:800;color:white;">🤖 WebDesign Assistant</h1>
        <p style="color:#9ca3af;font-size:0.9rem;">Ask me about HTML, CSS, JavaScript, courses, or pricing!</p>
    </div>
    
    <!-- Chat Messages -->
    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:1rem;background:#0a0a0a;border-radius:16px;border:1px solid #1f2937;margin-bottom:1rem;">
        <div style="display:flex;gap:0.75rem;margin-bottom:1rem;">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">🤖</div>
            <div style="background:#111827;padding:0.75rem 1rem;border-radius:12px;color:#d1d5db;max-width:80%;">
                Hey! I'm your WebDesign Academy assistant. Ask me anything! 👋
            </div>
        </div>
    </div>
    
    <!-- Quick Suggestions -->
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;" id="suggestions">
        <button onclick="sendSuggestion('What is HTML?')" style="padding:0.4rem 0.8rem;background:#1f2937;color:#d1d5db;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:0.8rem;">What is HTML?</button>
        <button onclick="sendSuggestion('How do I center a div?')" style="padding:0.4rem 0.8rem;background:#1f2937;color:#d1d5db;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:0.8rem;">How to center a div?</button>
        <button onclick="sendSuggestion('Show me CSS Flexbox')" style="padding:0.4rem 0.8rem;background:#1f2937;color:#d1d5db;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:0.8rem;">CSS Flexbox</button>
        <button onclick="sendSuggestion('Pricing plans')" style="padding:0.4rem 0.8rem;background:#1f2937;color:#d1d5db;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:0.8rem;">💰 Pricing</button>
        <button onclick="sendSuggestion('JavaScript basics')" style="padding:0.4rem 0.8rem;background:#1f2937;color:#d1d5db;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:0.8rem;">JavaScript</button>
    </div>
    
    <!-- Input -->
    <div style="display:flex;gap:0.5rem;">
        <input type="text" id="chatInput" placeholder="Type your question..." 
               style="flex:1;padding:0.85rem 1rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;font-size:0.95rem;"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="padding:0.85rem 1.5rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Send</button>
    </div>
</div>

<script>
function addMessage(text, isUser = false) {
    const messages = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.style.cssText = `display:flex;gap:0.75rem;margin-bottom:1rem;${isUser ? 'justify-content:flex-end;' : ''}`;
    
    if (isUser) {
        div.innerHTML = `
            <div style="background:#6366f1;padding:0.75rem 1rem;border-radius:12px;color:white;max-width:80%;">${text}</div>
            <div style="width:36px;height:36px;background:#374151;border-radius:50%;display:flex;align-items:center;justify-content:center;">👤</div>
        `;
    } else {
        div.innerHTML = `
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">🤖</div>
            <div style="background:#111827;padding:0.75rem 1rem;border-radius:12px;color:#d1d5db;max-width:80%;">${text}</div>
        `;
    }
    
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;
    
    addMessage(message, true);
    input.value = '';
    
    fetch('/chatbot/api/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: 'message=' + encodeURIComponent(message)
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.response);
    })
    .catch(() => {
        addMessage('Sorry, something went wrong. Try again!');
    });
}

function sendSuggestion(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}
</script>

{% endblock %}
