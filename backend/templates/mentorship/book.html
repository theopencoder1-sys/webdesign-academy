{% extends 'base.html' %}
{% block title %}Book Mentorship - WebDesign Academy{% endblock %}
{% block content %}
<div style="max-width:600px;margin:3rem auto;padding:2rem;">
    <h1 style="font-size:2rem;font-weight:800;color:white;">📅 Book Mentorship Session</h1>
    <form method="POST" class="card" style="padding:2rem;margin-top:1rem;">
        {% csrf_token %}
        <label style="color:#9ca3af;">Topic</label>
        <input type="text" name="topic" placeholder="Career advice, code help, project review..." required style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;">
        <label style="color:#9ca3af;">What do you want to discuss?</label>
        <textarea name="description" rows="3" style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;"></textarea>
        <label style="color:#9ca3af;">Preferred Date & Time</label>
        <input type="datetime-local" name="session_date" required style="width:100%;padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;margin:0.5rem 0 1rem;">
        <button type="submit" class="btn btn-primary" style="width:100%;">Book Session 🚀</button>
    </form>
</div>
{% endblock %}
