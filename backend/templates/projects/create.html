{% extends 'base.html' %}
{% block title %}Submit Project - WebDesign Academy{% endblock %}
{% block content %}
<div style="max-width:600px;margin:3rem auto;padding:2rem;">
    <h1 style="font-size:2rem;font-weight:800;color:white;margin-bottom:2rem;">🚀 Submit Your Project</h1>
    
    <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Project Title" required style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
        <textarea name="description" placeholder="Describe your project..." rows="4" required style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;resize:vertical;"></textarea>
        <input type="url" name="live_url" placeholder="Live URL (optional)" style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
        <input type="url" name="github_url" placeholder="GitHub URL (optional)" style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
        <input type="text" name="technologies" placeholder="Technologies: HTML, CSS, JavaScript" style="padding:0.85rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;">
        <button type="submit" class="btn btn-primary" style="justify-content:center;">Publish Project 🎉</button>
    </form>
</div>
{% endblock %}
