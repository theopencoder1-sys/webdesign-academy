{% extends 'base.html' %}
{% block title %}Playground - WebDesign Academy{% endblock %}
{% block content %}

<div class="playground-container">
    <!-- Tab Bar -->
    <div class="pg-tabs">
        <button onclick="switchTab('html')" id="tab-html" class="pg-tab active">📄 HTML</button>
        <button onclick="switchTab('css')" id="tab-css" class="pg-tab">🎨 CSS</button>
        <button onclick="switchTab('js')" id="tab-js" class="pg-tab">⚡ JS</button>
        <div class="pg-actions">
            <button onclick="runCode()" class="pg-btn-run">▶ Run</button>
            <button onclick="downloadCode()" class="pg-btn">💾 Save</button>
        </div>
    </div>
    
    <!-- Editor + Preview -->
    <div class="pg-main">
        <!-- Editor Panel -->
        <div class="pg-editor">
            <textarea id="htmlCode" placeholder="<!-- HTML -->" class="pg-textarea"></textarea>
            <textarea id="cssCode" placeholder="/* CSS */" class="pg-textarea" style="display:none;"></textarea>
            <textarea id="jsCode" placeholder="// JavaScript" class="pg-textarea" style="display:none;"></textarea>
        </div>
        
        <!-- Preview Panel -->
        <div class="pg-preview">
            <div class="pg-preview-header">👁️ Preview</div>
            <iframe id="output" class="pg-iframe"></iframe>
        </div>
    </div>
</div>

<style>
.playground-container {
    height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
    background: #0a0a0a;
}
.pg-tabs {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    flex-wrap: wrap;
}
.pg-tab {
    padding: 0.5rem 1rem;
    background: #1f2937;
    color: #9ca3af;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
}
.pg-tab.active {
    background: #6366f1;
    color: white;
}
.pg-actions {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
}
.pg-btn-run {
    padding: 0.5rem 1rem;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
}
.pg-btn {
    padding: 0.5rem 0.75rem;
    background: #374151;
    color: #d1d5db;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
}
.pg-main {
    flex: 1;
    display: flex;
    overflow: hidden;
}
.pg-editor {
    width: 50%;
    display: flex;
    flex-direction: column;
}
.pg-textarea {
    flex: 1;
    background: #0a0a0a;
    color: #e5e7eb;
    border: none;
    padding: 1rem;
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    resize: none;
    outline: none;
    line-height: 1.6;
}
.pg-textarea::placeholder { color: #4b5563; }
.pg-preview {
    width: 50%;
    border-left: 2px solid #1f2937;
    display: flex;
    flex-direction: column;
}
.pg-preview-header {
    padding: 0.4rem 1rem;
    background: #111827;
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
    border-bottom: 1px solid #1f2937;
}
.pg-iframe {
    flex: 1;
    border: none;
    background: white;
}

/* Mobile */
@media (max-width: 768px) {
    .pg-main { flex-direction: column; }
    .pg-editor { width: 100%; height: 50%; }
    .pg-preview { width: 100%; height: 50%; border-left: none; border-top: 2px solid #1f2937; }
    .pg-tab { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
    .pg-btn-run, .pg-btn { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
    .pg-textarea { font-size: 0.8rem; padding: 0.75rem; }
}
</style>

<script>
const htmlCode = document.getElementById('htmlCode');
const cssCode = document.getElementById('cssCode');
const jsCode = document.getElementById('jsCode');
const output = document.getElementById('output');

// Starter code
htmlCode.value = '<h1>Hello! 👋</h1>\n<p>Start coding...</p>';
cssCode.value = 'h1 { color: #6366f1; font-family: sans-serif; }\np { color: #666; }';
jsCode.value = 'console.log("Welcome to the playground!");';

function runCode() {
    const doc = output.contentDocument || output.contentWindow.document;
    doc.open();
    doc.write(`<!DOCTYPE html><html><head><style>${cssCode.value}</style></head><body>${htmlCode.value}<script>${jsCode.value}<\/script></body></html>`);
    doc.close();
}

function switchTab(tab) {
    document.querySelectorAll('.pg-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    htmlCode.style.display = tab === 'html' ? 'block' : 'none';
    cssCode.style.display = tab === 'css' ? 'block' : 'none';
    jsCode.style.display = tab === 'js' ? 'block' : 'none';
}

function downloadCode() {
    const code = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n${cssCode.value}\n</style>\n</head>\n<body>\n${htmlCode.value}\n<script>\n${jsCode.value}\n<\/script>\n</body>\n</html>`;
    const blob = new Blob([code], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'my-project.html';
    a.click();
}

runCode();
</script>
{% endblock %}
