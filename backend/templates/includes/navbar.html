<nav class="glass" style="position:fixed;top:0;left:0;right:0;z-index:1000;">
    <div style="max-width:1200px;margin:0 auto;padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;">
        <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:0.5rem;">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:0.9rem;">WD</div>
            <span style="font-size:1.2rem;font-weight:800;" class="hide-mobile">
                <span class="gradient-text">WebDesign</span>
                <span style="color:white;">Academy</span>
            </span>
        </a>
        
        <div style="display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;">
            <a href="/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Home</a>
            <a href="/courses/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Courses</a>
            <a href="/playground/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Playground</a>
            <a href="/projects/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Projects</a>
            <a href="/community/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Community</a>
            
            {% if user.is_authenticated %}
            <a href="/dashboard/" style="color:#d1d5db;font-size:0.85rem;font-weight:500;text-decoration:none;">Dashboard</a>
            
            {% if user.is_premium or user.is_staff %}
            <a href="/courses/certificate/html5-fundamentals/" style="color:#f59e0b;font-size:0.85rem;font-weight:600;text-decoration:none;">🏆</a>
            {% endif %}
            
            <span style="color:#f59e0b;font-size:0.8rem;">🔥 {{ user.streak }}</span>
            <span style="color:#d1d5db;font-size:0.8rem;">⚡ {{ user.xp }} XP</span>
            <a href="/auth/logout/" class="btn btn-outline btn-sm">Logout</a>
            {% else %}
            <a href="/auth/login/" class="btn btn-outline btn-sm">Login</a>
            <a href="/auth/signup/" class="btn btn-primary btn-sm">Get Started Free</a>
            {% endif %}
        </div>
    </div>
</nav>
