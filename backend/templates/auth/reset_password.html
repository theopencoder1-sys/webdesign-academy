{% extends 'base.html' %}
{% block title %}Reset Password - WebDesign Academy{% endblock %}
{% block content %}
<div style="max-width:440px;margin:4rem auto;padding:2rem;">
    <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-size:3rem;">🔐</div>
        <h1 style="font-size:2rem;font-weight:800;color:white;">Reset Password</h1>
        <p style="color:#9ca3af;margin-top:0.5rem;">Enter your new password below.</p>
    </div>
    
    {% if messages %}
    {% for message in messages %}
    <div style="padding:1rem;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:12px;color:#ef4444;font-size:0.9rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem;">
        <span style="font-size:1.2rem;">❌</span>
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    
    <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
        {% csrf_token %}
        <div>
            <label style="color:#9ca3af;font-size:0.85rem;">New Password</label>
            <input type="password" name="password" placeholder="Min 8 characters" required 
                   style="width:100%;padding:0.85rem 1rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;font-size:1rem;margin-top:0.3rem;">
        </div>
        <div>
            <label style="color:#9ca3af;font-size:0.85rem;">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter password" required 
                   style="width:100%;padding:0.85rem 1rem;background:#111827;border:1px solid #374151;border-radius:12px;color:white;font-size:1rem;margin-top:0.3rem;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Reset Password</button>
    </form>
</div>
{% endblock %}
